name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  review:
    if: >
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          claude_args: '--allowedTools "Read" "Glob" "Grep" "Bash(gh pr comment:*)" "Bash(gh pr review:*)" "Bash(gh pr diff:*)" "Bash(gh pr view:*)" "mcp__github_inline_comment__create_inline_comment"'
          prompt: |
            Review ONLY the changes in this PR's diff. Do not review the wider codebase.
            Run `gh pr diff` to see the diff and restrict your review strictly to those changes.
            Focus on: mathematical correctness, edge cases (division by zero, buffer overflows, off-by-one errors), and consistency with existing code style.
            Only flag issues that matter — no nitpicks.
            If the diff is empty or contains no issues, use `gh pr review --approve`.
            If you find issues in the diff, use `gh pr review --request-changes`.
