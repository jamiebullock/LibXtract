name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  review:
    if: >
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: '--allowedTools "Bash(gh pr comment:*)" "Bash(gh pr review:*)" "Bash(gh pr diff:*)" "Bash(gh pr view:*)" "mcp__github_inline_comment__create_inline_comment"'
          prompt: |
            Review this PR for bugs, correctness issues, and code style.
            Focus on: mathematical correctness, edge cases (division by zero, buffer overflows, off-by-one errors), and consistency with existing code style.
            Only flag issues that matter — no nitpicks.
            If you find issues, use `gh pr review --request-changes` to block the merge.
            If the code looks good, use `gh pr review --approve`.
