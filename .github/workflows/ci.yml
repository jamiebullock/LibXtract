name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node.js (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-python mingw-w64-x86_64-swig mingw-w64-x86_64-nodejs make

      - name: Install SWIG (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y swig

      - name: Install SWIG (macOS)
        if: runner.os == 'macOS'
        run: brew install swig

      - name: Build and test (Linux)
        if: runner.os == 'Linux'
        run: |
          make
          make check

      - name: Build and test (macOS)
        if: runner.os == 'macOS'
        run: |
          make
          make check

      - name: Build and test (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          make
          make check

      - name: Install Node.js headers (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          NODE_VER=$(node -v | tr -d v)
          curl -sL "https://nodejs.org/dist/v${NODE_VER}/node-v${NODE_VER}-headers.tar.gz" | tar xz
          echo "NODE_INCLUDE=$(pwd)/node-v${NODE_VER}/include/node" >> $GITHUB_ENV
          npm install --prefix swig node-addon-api

      - name: SWIG bindings (Linux)
        if: runner.os == 'Linux'
        run: make -C swig check
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          NODE_INCLUDE: ${{ env.NODE_INCLUDE }}
          PYTHON: python3

      - name: SWIG bindings (macOS)
        if: runner.os == 'macOS'
        run: make -C swig check
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          NODE_INCLUDE: ${{ env.NODE_INCLUDE }}

      - name: SWIG bindings (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          npm install --prefix swig node-addon-api
          PYTHON=python NODE_INCLUDE=/mingw64/include/node JAVA_HOME="$(cygpath -u "$JAVA_HOME")" make -C swig check
