name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-python mingw-w64-x86_64-swig make

      - name: Install SWIG (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y swig

      - name: Install SWIG (macOS)
        if: runner.os == 'macOS'
        run: brew install swig

      - name: Build and test (Linux)
        if: runner.os == 'Linux'
        run: |
          make
          make check

      - name: Build and test (macOS)
        if: runner.os == 'macOS'
        run: |
          make
          make check

      - name: Build and test (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          make
          make check

      - name: SWIG bindings (Linux)
        if: runner.os == 'Linux'
        run: make -C swig check
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          PYTHON: python3

      - name: SWIG bindings (macOS)
        if: runner.os == 'macOS'
        run: make -C swig check
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: SWIG bindings (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: PYTHON=python make -C swig check-python
