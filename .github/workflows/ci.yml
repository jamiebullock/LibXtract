name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc make

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: make -C src

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: make -C src

      - name: Test (Linux)
        if: runner.os == 'Linux'
        run: make check

      - name: Test (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: make check
